<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>王老师的班级管理器</title>

    <!--
    ===== Supabase 建表 SQL（在 Supabase SQL Editor 中执行） =====

    CREATE TABLE students (
      "id" TEXT PRIMARY KEY,
      "name" TEXT NOT NULL,
      "gender" TEXT DEFAULT '待完善',
      "totalScore" INTEGER DEFAULT 0,
      "recentPerformance" TEXT DEFAULT '',
      "extraTags" JSONB DEFAULT '[]'::jsonb,
      "createdAt" TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE history_exams (
      "id" BIGSERIAL PRIMARY KEY,
      "examName" TEXT NOT NULL,
      "examDate" TEXT NOT NULL,
      "scores" JSONB DEFAULT '[]'::jsonb,
      "importedAt" TIMESTAMPTZ DEFAULT NOW()
    );

    -- 启用 RLS
    ALTER TABLE students ENABLE ROW LEVEL SECURITY;
    ALTER TABLE history_exams ENABLE ROW LEVEL SECURITY;

    -- 允许匿名访问（公开演示用；生产环境应加认证）
    CREATE POLICY "anon_all" ON students FOR ALL USING (true) WITH CHECK (true);
    CREATE POLICY "anon_all" ON history_exams FOR ALL USING (true) WITH CHECK (true);

    -- 启用实时同步
    ALTER PUBLICATION supabase_realtime ADD TABLE students;
    ALTER PUBLICATION supabase_realtime ADD TABLE history_exams;
    -->

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            background: #f0f2f5;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
        }

        .page.active {
            display: flex;
        }

        /* ===== 欢迎页 ===== */
        #page-welcome {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-align: center;
        }

        #page-welcome h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 60px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
            line-height: 1.4;
        }

        /* ===== 主页面 ===== */
        #page-main {
            justify-content: flex-start;
            padding-top: 60px;
        }

        .main-header {
            width: 100%;
            display: flex;
            align-items: center;
            margin-bottom: 48px;
        }

        .btn-back {
            font-size: 1rem;
            padding: 10px 20px;
            background: #fff;
            color: #333;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-back:active {
            background: #e8e8e8;
        }

        .main-title {
            flex: 1;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-right: 70px;
        }

        .main-buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 16px;
        }

        /* ===== 通用按钮 ===== */
        .btn {
            display: block;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            padding: 18px 24px;
            font-size: 1.15rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-appearance: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #fff;
            color: #667eea;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .btn-primary:active {
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .btn-card {
            background: #fff;
            color: #333;
            padding: 28px 24px;
            font-size: 1.2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: left;
        }

        .btn-card:active {
            background: #f5f5f5;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        /* ===== 历史成绩单页 ===== */
        #page-exam {
            justify-content: flex-start;
            padding-top: 20px;
            padding-bottom: 40px;
        }

        .exam-header {
            width: 100%;
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .exam-title {
            flex: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-right: 70px;
        }

        .upload-area {
            width: 100%;
            max-width: 360px;
            margin-bottom: 24px;
        }

        .upload-label {
            display: block;
            width: 100%;
            padding: 16px 24px;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 600;
            color: #667eea;
            background: #fff;
            border: 2px dashed #667eea;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-label:active {
            background: #f0eeff;
        }

        .upload-hint {
            display: block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #999;
            font-weight: 400;
        }

        .upload-input {
            display: none;
        }

        /* 考试列表 */
        .exam-list-wrap {
            width: 100%;
            max-width: 360px;
        }

        .exam-list-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
        }

        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .exam-item {
            background: #fff;
            border-radius: 10px;
            padding: 14px 16px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: background 0.15s;
        }

        .exam-item:active {
            background: #f5f5f5;
        }

        .exam-item-name {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .exam-item-date {
            font-size: 0.82rem;
            color: #999;
            margin-top: 4px;
        }

        .exam-item-count {
            font-size: 0.8rem;
            color: #667eea;
            margin-top: 2px;
        }

        /* 展开的详细成绩表格 */
        .exam-detail {
            display: none;
            margin-top: 12px;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }

        .exam-detail.open {
            display: block;
        }

        .exam-detail table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .exam-detail th {
            text-align: left;
            padding: 8px 6px;
            border-bottom: 2px solid #667eea;
            color: #667eea;
            font-weight: 600;
            font-size: 0.82rem;
        }

        .exam-detail td {
            padding: 8px 6px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        .exam-detail tr:last-child td {
            border-bottom: none;
        }

        .exam-detail .rank-col {
            width: 36px;
            color: #999;
            font-size: 0.8rem;
            text-align: center;
        }

        .exam-detail .score-col {
            text-align: right;
            font-weight: 600;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 40px 0;
            font-size: 0.95rem;
        }

        /* ===== 学生情况页 ===== */
        #page-students {
            justify-content: flex-start;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .students-header {
            width: 100%;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .students-title {
            flex: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-right: 70px;
        }

        /* 工具栏 */
        .students-toolbar {
            width: 100%;
            max-width: 360px;
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .btn-tool {
            flex: 1;
            padding: 11px 8px;
            font-size: 0.88rem;
            font-weight: 600;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-appearance: none;
            text-align: center;
            min-height: 44px;
        }

        .btn-tool-add {
            background: #667eea;
            color: #fff;
        }

        .btn-tool-add:active {
            background: #5a6fd6;
        }

        .btn-tool-import {
            background: #fff;
            color: #667eea;
            border: 1.5px solid #667eea;
        }

        .btn-tool-import:active {
            background: #f0eeff;
        }

        /* 学生列表 */
        .student-list-wrap {
            width: 100%;
            max-width: 360px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .student-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 20px;
        }

        .student-row {
            display: flex;
            align-items: stretch;
            gap: 8px;
        }

        .student-btn {
            flex: 1;
            padding: 16px 20px;
            background: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            text-align: left;
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: background 0.15s;
            -webkit-appearance: none;
            min-height: 56px;
        }

        .student-btn:active {
            background: #f0eeff;
        }

        .student-btn .student-gender {
            font-weight: 400;
            font-size: 0.85rem;
            color: #999;
            margin-left: 8px;
        }

        .student-btn .student-score {
            float: right;
            color: #667eea;
            font-size: 0.95rem;
        }

        .student-delete {
            width: 48px;
            min-width: 48px;
            min-height: 56px;
            padding: 0;
            background: #fff;
            color: #e05050;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
            transition: background 0.15s;
            -webkit-appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .student-delete:active {
            background: #fff0f0;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-sheet {
            background: #fff;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            max-height: 85dvh;
            border-radius: 16px 16px 0 0;
            padding: 24px 20px 32px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            animation: slideUp 0.25s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: #d9d9d9;
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-info {
            margin-bottom: 16px;
        }

        .modal-info-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }

        .modal-info-row:last-child {
            border-bottom: none;
        }

        .modal-info-label {
            color: #999;
            width: 72px;
            flex-shrink: 0;
        }

        .modal-info-value {
            color: #333;
            font-weight: 500;
        }

        .modal-section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            margin: 20px 0 10px;
        }

        .modal-textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
            -webkit-appearance: none;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-save {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #667eea;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-appearance: none;
        }

        .btn-save:active {
            background: #5a6fd6;
        }

        .btn-close {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-appearance: none;
        }

        .btn-close:active {
            background: #e0e0e0;
        }

        /* 词条标签 */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-list-empty {
            color: #bbb;
            font-size: 0.85rem;
            padding: 4px 0;
        }

        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f0eeff;
            color: #667eea;
            padding: 5px 10px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .tag-delete {
            width: 18px;
            height: 18px;
            padding: 0;
            border: none;
            background: none;
            color: #c0b8e8;
            font-size: 0.75rem;
            cursor: pointer;
            line-height: 18px;
            text-align: center;
            border-radius: 50%;
            transition: color 0.15s, background 0.15s;
            -webkit-appearance: none;
        }

        .tag-delete:active {
            color: #e05050;
            background: rgba(224,80,80,0.1);
        }

        .tag-add-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .tag-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            -webkit-appearance: none;
        }

        .tag-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
        }

        .btn-add-tag {
            flex-shrink: 0;
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            background: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-appearance: none;
        }

        .btn-add-tag:active {
            background: #5a6fd6;
        }

        /* 添加学生表单 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            -webkit-appearance: none;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 8px 0;
        }

        .radio-item input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
            margin: 0;
        }

        /* 同步状态指示器 */
        .sync-indicator {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 6px rgba(76,175,80,0.4);
            z-index: 500;
            transition: background 0.3s;
        }

        .sync-indicator.offline {
            background: #f44336;
            box-shadow: 0 0 6px rgba(244,67,54,0.4);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 2000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- 同步状态指示器 -->
    <div id="sync-dot" class="sync-indicator" title="云端已连接"></div>

    <!-- ==================== 页面区 ==================== -->

    <!-- 欢迎页 -->
    <div id="page-welcome" class="page active">
        <h1>王老师您辛苦了</h1>
        <button class="btn btn-primary" onclick="goTo('page-main')">下一步</button>
    </div>

    <!-- 主页面 -->
    <div id="page-main" class="page">
        <div class="main-header">
            <button class="btn-back" onclick="goTo('page-welcome')">← 返回</button>
            <span class="main-title">班级管理</span>
        </div>
        <div class="main-buttons">
            <button class="btn btn-card" onclick="goTo('page-exam')">📊 历史成绩单</button>
            <button class="btn btn-card" onclick="goTo('page-students')">👨‍🎓 学生情况</button>
        </div>
    </div>

    <!-- 历史成绩单页 -->
    <div id="page-exam" class="page">
        <div class="exam-header">
            <button class="btn-back" onclick="goTo('page-main')">← 返回</button>
            <span class="exam-title">历史成绩单</span>
        </div>

        <div class="upload-area">
            <label class="upload-label" for="file-input">
                📁 上传成绩单（.xlsx / .xls）
                <span class="upload-hint">Excel 需包含：学生姓名、总分、考试名称、考试日期</span>
            </label>
            <input id="file-input" class="upload-input" type="file" accept=".xlsx,.xls" onchange="handleFile(event)">
        </div>

        <div class="exam-list-wrap">
            <div class="exam-list-title" id="list-title" style="display:none">已导入的成绩单</div>
            <div class="exam-list" id="exam-list"></div>
            <div class="empty-state" id="exam-empty">暂无历史成绩单</div>
        </div>
    </div>

    <!-- 学生情况页 -->
    <div id="page-students" class="page">
        <div class="students-header">
            <button class="btn-back" onclick="goTo('page-main')">← 返回</button>
            <span class="students-title">学生情况</span>
        </div>
        <div class="students-toolbar">
            <button class="btn-tool btn-tool-add" onclick="openAddStudentForm()">➕ 添加学生</button>
            <button class="btn-tool btn-tool-import" onclick="document.getElementById('student-file-input').click()">📂 从成绩单导入</button>
            <input id="student-file-input" class="upload-input" type="file" accept=".xlsx,.xls" onchange="handleStudentImport(event)">
        </div>
        <div class="student-list-wrap">
            <div class="student-list" id="student-list"></div>
        </div>
    </div>

    <!-- ==================== 学生详情模态框 ==================== -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-sheet" id="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-info" id="modal-info">
                <div class="modal-info-row">
                    <span class="modal-info-label">总分</span>
                    <span class="modal-info-value" id="modal-score"></span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">性别</span>
                    <select class="form-select" id="modal-gender" style="flex:1">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>
            <div class="modal-section-title">其他情况</div>
            <div id="modal-tags"></div>
            <div class="tag-add-row">
                <input class="tag-input" id="tag-input" placeholder="输入新词条，如&ldquo;发言进步&rdquo;">
                <button class="btn-add-tag" onclick="addTag()">添加词条</button>
            </div>
            <div class="modal-section-title">最近表现</div>
            <textarea class="modal-textarea" id="modal-textarea" placeholder="请输入学生最近表现..."></textarea>
            <div class="modal-actions">
                <button class="btn-close" onclick="closeModalDirect()">关闭</button>
                <button class="btn-save" onclick="savePerformance()">保存</button>
            </div>
        </div>
    </div>

    <!-- ==================== 添加学生表单模态框 ==================== -->
    <div id="form-overlay" class="modal-overlay" onclick="closeFormModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="modal-title">添加学生</div>

            <div class="form-group">
                <label class="form-label">姓名 <span style="color:#e05050">*</span></label>
                <input class="form-input" id="form-name" placeholder="请输入学生姓名" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label">性别</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="form-gender" value="男" checked> 男
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="form-gender" value="女"> 女
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">总分</label>
                <input class="form-input" id="form-score" type="number" placeholder="请输入总分" min="0" value="0">
            </div>

            <div class="form-group">
                <label class="form-label">最近表现</label>
                <textarea class="modal-textarea" id="form-performance" placeholder="请输入最近表现..." style="min-height:64px">新录入的学生</textarea>
            </div>

            <div class="modal-actions">
                <button class="btn-close" onclick="closeFormModalDirect()">取消</button>
                <button class="btn-save" onclick="submitAddStudent()">确认添加</button>
            </div>
        </div>
    </div>

    <script>
        // ===== Supabase 初始化 =====
        var SUPABASE_URL = '{{NEXT_PUBLIC_SUPABASE_URL}}';
        var SUPABASE_ANON_KEY = '{{NEXT_PUBLIC_SUPABASE_ANON_KEY}}';

        var supabase;
        var supabaseReady = false;

        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                realtime: { params: { eventsPerSecond: 10 } }
            });
            supabaseReady = true;
        } catch (e) {
            console.error('Supabase 初始化失败', e);
        }

        // ===== 内存缓存 =====
        var studentsCache = [];
        var examsCache = [];

        // ===== 默认学生数据（首次初始化用） =====
        var DEFAULT_STUDENTS = [
            { id: "1", name: "张三", gender: "男", totalScore: 285, recentPerformance: "最近上课专注，作业完成良好", extraTags: ["热爱阅读", "数学课代表"] },
            { id: "2", name: "李四", gender: "女", totalScore: 292, recentPerformance: "英语突出，需加强语文", extraTags: ["英语课代表"] },
            { id: "3", name: "王芳", gender: "女", totalScore: 278, recentPerformance: "课堂发言积极，作业需要更细心", extraTags: ["文艺委员"] }
        ];

        // ===== 实时同步 =====
        function setupRealtime() {
            if (!supabaseReady) return;

            // 监听 students 表变更
            supabase
                .channel('students-changes')
                .on('postgres_changes',
                    { event: '*', schema: 'public', table: 'students' },
                    function (payload) {
                        if (payload.eventType === 'INSERT') {
                            studentsCache.push(payload.new);
                        } else if (payload.eventType === 'UPDATE') {
                            for (var i = 0; i < studentsCache.length; i++) {
                                if (studentsCache[i].id === payload.new.id) {
                                    studentsCache[i] = payload.new;
                                    break;
                                }
                            }
                        } else if (payload.eventType === 'DELETE') {
                            studentsCache = studentsCache.filter(function (s) { return s.id !== payload.old.id; });
                        }
                        // 刷新当前页面 UI
                        if (currentPage === 'page-students') {
                            renderStudentList();
                        }
                        // 如果详情模态框打开着且修改的是当前学生，刷新模态框
                        if (currentStudentId && (payload.eventType === 'UPDATE') && payload.new.id === currentStudentId) {
                            refreshModalForStudent(payload.new);
                        }
                    }
                )
                .subscribe(function (status) {
                    if (status === 'SUBSCRIBED') {
                        document.getElementById('sync-dot').classList.remove('offline');
                    }
                });

            // 监听 history_exams 表变更
            supabase
                .channel('exams-changes')
                .on('postgres_changes',
                    { event: '*', schema: 'public', table: 'history_exams' },
                    function (payload) {
                        if (payload.eventType === 'INSERT') {
                            examsCache.push(payload.new);
                            examsCache.sort(sortExamsByDate);
                        } else if (payload.eventType === 'UPDATE') {
                            for (var i = 0; i < examsCache.length; i++) {
                                if (examsCache[i].id === payload.new.id) {
                                    examsCache[i] = payload.new;
                                    break;
                                }
                            }
                            examsCache.sort(sortExamsByDate);
                        } else if (payload.eventType === 'DELETE') {
                            examsCache = examsCache.filter(function (e) { return e.id !== payload.old.id; });
                        }
                        if (currentPage === 'page-exam') {
                            renderExamList();
                        }
                    }
                )
                .subscribe();
        }

        function sortExamsByDate(a, b) {
            if (a.examDate === b.examDate) return 0;
            if (a.examDate === '未知日期') return 1;
            if (b.examDate === '未知日期') return -1;
            return a.examDate > b.examDate ? -1 : 1;
        }

        // 当实时同步更新当前打开的学生时，刷新模态框中的非编辑字段
        function refreshModalForStudent(student) {
            document.getElementById('modal-title').textContent = student.name;
            document.getElementById('modal-score').textContent = student.totalScore + ' 分';
            var genderSelect = document.getElementById('modal-gender');
            genderSelect.value = (student.gender === '女') ? '女' : '男';
            document.getElementById('modal-textarea').value = student.recentPerformance || '';
            renderTags(student);
        }

        // ===== 数据加载与初始化 =====
        async function loadStudents() {
            if (!supabaseReady) return;
            var result = await supabase.from('students').select('*').order('createdAt', { ascending: true });
            if (result.error) {
                console.error('加载学生失败', result.error);
                document.getElementById('sync-dot').classList.add('offline');
                return;
            }
            studentsCache = result.data || [];
        }

        async function loadExams() {
            if (!supabaseReady) return;
            var result = await supabase.from('history_exams').select('*').order('importedAt', { ascending: false });
            if (result.error) {
                console.error('加载考试失败', result.error);
                document.getElementById('sync-dot').classList.add('offline');
                return;
            }
            examsCache = result.data || [];
            examsCache.sort(sortExamsByDate);
        }

        async function seedDefaultStudents() {
            if (!supabaseReady) return;
            var result = await supabase.from('students').select('id', { count: 'exact', head: true });
            if (result.error || result.count > 0) return;

            var insertResult = await supabase.from('students').upsert(DEFAULT_STUDENTS, { onConflict: 'id' });
            if (insertResult.error) {
                console.error('初始化学生数据失败', insertResult.error);
            }
        }

        async function initApp() {
            if (!supabaseReady) {
                // Supabase 不可用时的降级提示
                document.getElementById('sync-dot').classList.add('offline');
                document.getElementById('sync-dot').title = '云端未连接 — 请检查环境变量配置';
                showToast('云端未连接，请刷新重试', 3000);
                return;
            }

            await seedDefaultStudents();
            await Promise.all([loadStudents(), loadExams()]);
            setupRealtime();

            // 初始化完成后渲染当前页面
            if (currentPage === 'page-exam') renderExamList();
            if (currentPage === 'page-students') renderStudentList();
        }

        // ===== 页面导航 =====
        var currentPage = localStorage.getItem('currentPage') || 'page-welcome';

        function goTo(pageId) {
            showPage(pageId);
            localStorage.setItem('currentPage', pageId);
        }

        function showPage(pageId) {
            var pages = document.querySelectorAll('.page');
            for (var i = 0; i < pages.length; i++) {
                pages[i].classList.remove('active');
            }
            document.getElementById(pageId).classList.add('active');
            currentPage = pageId;

            if (pageId === 'page-exam') {
                renderExamList();
            }
            if (pageId === 'page-students') {
                renderStudentList();
            }
        }

        // 初始化
        showPage(currentPage);
        if (!localStorage.getItem('currentPage')) {
            showPage('page-welcome');
        }

        // ===== Toast =====
        function showToast(msg, duration) {
            duration = duration || 2000;
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function () {
                t.classList.remove('show');
            }, duration);
        }

        // ===== Excel 解析（历史成绩单） =====
        function handleFile(e) {
            var file = e.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = async function (evt) {
                try {
                    var data = new Uint8Array(evt.target.result);
                    var workbook = XLSX.read(data, { type: 'array' });
                    var sheetName = workbook.SheetNames[0];
                    var sheet = workbook.Sheets[sheetName];
                    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                    if (rows.length < 2) {
                        showToast('Excel 文件为空或格式不正确');
                        return;
                    }

                    var headers = rows[0];
                    var idxName = -1, idxTotal = -1, idxExamName = -1, idxExamDate = -1;

                    for (var i = 0; i < headers.length; i++) {
                        var h = String(headers[i] || '').trim();
                        if (h === '学生姓名' || h === '姓名' || h === '名字') idxName = i;
                        if (h === '总分' || h === '总成绩' || h === '总分数') idxTotal = i;
                        if (h === '考试名称' || h === '考试' || h === '考试名') idxExamName = i;
                        if (h === '考试日期' || h === '日期') idxExamDate = i;
                    }

                    if (idxName === -1 || idxTotal === -1) {
                        showToast('未找到"学生姓名"或"总分"列，请检查 Excel 表头');
                        return;
                    }

                    var examName = '未知考试';
                    var examDate = '未知日期';
                    var scores = [];

                    for (var r = 1; r < rows.length; r++) {
                        var row = rows[r];
                        if (!row || !row[idxName]) continue;

                        var name = String(row[idxName] || '').trim();
                        var totalScore = parseFloat(row[idxTotal]) || 0;

                        scores.push({ name: name, totalScore: totalScore });

                        if (idxExamName !== -1) {
                            var en = String(row[idxExamName] || '').trim();
                            if (en) examName = en;
                        }
                        if (idxExamDate !== -1) {
                            var ed = String(row[idxExamDate] || '').trim();
                            if (ed) examDate = ed;
                        }
                    }

                    if (scores.length === 0) {
                        showToast('未读取到有效学生数据');
                        return;
                    }

                    scores.sort(function (a, b) { return b.totalScore - a.totalScore; });

                    if (!supabaseReady) { showToast('云端未连接'); return; }

                    var insertResult = await supabase.from('history_exams').insert({
                        examName: examName,
                        examDate: examDate,
                        scores: scores,
                        importedAt: new Date().toISOString()
                    });

                    if (insertResult.error) {
                        showToast('保存失败：' + insertResult.error.message);
                        return;
                    }

                    showToast('成功导入「' + examName + '」，共 ' + scores.length + ' 名学生');
                } catch (err) {
                    showToast('解析文件出错：' + err.message);
                }
            };

            reader.readAsArrayBuffer(file);
            e.target.value = '';
        }

        // ===== 渲染考试列表（从缓存） =====
        function renderExamList() {
            var listEl = document.getElementById('exam-list');
            var emptyEl = document.getElementById('exam-empty');
            var titleEl = document.getElementById('list-title');

            if (examsCache.length === 0) {
                listEl.innerHTML = '';
                emptyEl.style.display = 'block';
                titleEl.style.display = 'none';
                return;
            }

            emptyEl.style.display = 'none';
            titleEl.style.display = 'block';

            var html = '';
            for (var i = 0; i < examsCache.length; i++) {
                var exam = examsCache[i];
                html += '<div class="exam-item" onclick="toggleDetail(' + i + ', this)">';
                html += '  <div class="exam-item-name">' + escapeHtml(exam.examName) + '</div>';
                html += '  <div class="exam-item-date">' + escapeHtml(exam.examDate) + '</div>';
                html += '  <div class="exam-item-count">' + (exam.scores || []).length + ' 名学生</div>';
                html += '  <div class="exam-detail" id="detail-' + i + '"></div>';
                html += '</div>';
            }

            listEl.innerHTML = html;
        }

        var openDetailIndex = -1;

        function toggleDetail(index, el) {
            var detailEl = document.getElementById('detail-' + index);

            if (openDetailIndex !== -1 && openDetailIndex !== index) {
                var prev = document.getElementById('detail-' + openDetailIndex);
                if (prev) prev.classList.remove('open');
            }

            if (detailEl.classList.contains('open')) {
                detailEl.classList.remove('open');
                openDetailIndex = -1;
                return;
            }

            if (!detailEl.innerHTML) {
                var exam = examsCache[index];
                var examScores = exam.scores || [];
                var tableHtml = '<table><thead><tr><th class="rank-col">#</th><th>姓名</th><th class="score-col">总分</th></tr></thead><tbody>';
                for (var i = 0; i < examScores.length; i++) {
                    var s = examScores[i];
                    tableHtml += '<tr>';
                    tableHtml += '<td class="rank-col">' + (i + 1) + '</td>';
                    tableHtml += '<td>' + escapeHtml(s.name) + '</td>';
                    tableHtml += '<td class="score-col">' + s.totalScore + '</td>';
                    tableHtml += '</tr>';
                }
                tableHtml += '</tbody></table>';
                detailEl.innerHTML = tableHtml;
            }

            detailEl.classList.add('open');
            openDetailIndex = index;
        }

        // ===== 学生列表渲染（从缓存） =====
        function renderStudentList() {
            var listEl = document.getElementById('student-list');

            if (studentsCache.length === 0) {
                listEl.innerHTML = '<div class="empty-state">暂无学生数据</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < studentsCache.length; i++) {
                var s = studentsCache[i];
                html += '<div class="student-row">';
                html += '  <button class="student-btn" onclick="openStudentModal(\'' + s.id + '\')">';
                html +=      escapeHtml(s.name);
                html +=      '<span class="student-gender">' + escapeHtml(s.gender) + '</span>';
                html +=      '<span class="student-score">' + (s.totalScore || 0) + '分</span>';
                html += '  </button>';
                html += '  <button class="student-delete" onclick="deleteStudent(\'' + s.id + '\', event)" title="删除">🗑️</button>';
                html += '</div>';
            }
            listEl.innerHTML = html;
        }

        // ===== 删除学生 =====
        async function deleteStudent(studentId, e) {
            if (e) { e.stopPropagation(); }

            var student = null;
            for (var i = 0; i < studentsCache.length; i++) {
                if (studentsCache[i].id === studentId) { student = studentsCache[i]; break; }
            }
            if (!student) return;

            if (!confirm('确定要删除学生「' + student.name + '」吗？此操作不可撤销。')) return;

            if (!supabaseReady) { showToast('云端未连接'); return; }

            var result = await supabase.from('students').delete().eq('id', studentId);
            if (result.error) {
                showToast('删除失败：' + result.error.message);
                return;
            }

            showToast('已删除「' + student.name + '」');
        }

        // ===== 添加学生表单 =====
        function openAddStudentForm() {
            document.getElementById('form-name').value = '';
            document.querySelector('input[name="form-gender"][value="男"]').checked = true;
            document.getElementById('form-score').value = '0';
            document.getElementById('form-performance').value = '新录入的学生';
            document.getElementById('form-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
            setTimeout(function () {
                document.getElementById('form-name').focus();
            }, 300);
        }

        function closeFormModal(e) {
            if (e && e.target !== document.getElementById('form-overlay')) return;
            closeFormModalDirect();
        }

        function closeFormModalDirect() {
            document.getElementById('form-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        async function submitAddStudent() {
            var name = document.getElementById('form-name').value.trim();
            if (!name) {
                showToast('请输入学生姓名');
                document.getElementById('form-name').focus();
                return;
            }

            var genderEl = document.querySelector('input[name="form-gender"]:checked');
            var gender = genderEl ? genderEl.value : '待完善';
            var totalScore = parseInt(document.getElementById('form-score').value) || 0;
            var performance = document.getElementById('form-performance').value.trim() || '新录入的学生';

            if (!supabaseReady) { showToast('云端未连接'); return; }

            var result = await supabase.from('students').insert({
                id: String(Date.now()),
                name: name,
                gender: gender,
                totalScore: totalScore,
                recentPerformance: performance,
                extraTags: []
            });

            if (result.error) {
                showToast('添加失败：' + result.error.message);
                return;
            }

            closeFormModalDirect();
            showToast('已添加学生「' + name + '」');
        }

        // ===== 从成绩单导入学生 =====
        function handleStudentImport(e) {
            var file = e.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = async function (evt) {
                try {
                    var data = new Uint8Array(evt.target.result);
                    var workbook = XLSX.read(data, { type: 'array' });
                    var sheetName = workbook.SheetNames[0];
                    var sheet = workbook.Sheets[sheetName];
                    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                    if (rows.length < 2) {
                        showToast('Excel 文件为空或格式不正确');
                        return;
                    }

                    var headers = rows[0];
                    var idxName = -1, idxTotal = -1, idxChinese = -1, idxMath = -1, idxEnglish = -1;

                    for (var i = 0; i < headers.length; i++) {
                        var h = String(headers[i] || '').trim();
                        if (h === '学生姓名' || h === '姓名' || h === '名字') idxName = i;
                        if (h === '总分' || h === '总成绩' || h === '总分数') idxTotal = i;
                        if (h === '语文') idxChinese = i;
                        if (h === '数学') idxMath = i;
                        if (h === '英语') idxEnglish = i;
                    }

                    if (idxName === -1) {
                        showToast('未找到"学生姓名"列，请检查 Excel 表头');
                        return;
                    }

                    if (!supabaseReady) { showToast('云端未连接'); return; }

                    var importCount = 0;
                    var updateCount = 0;

                    // 构建姓名→现有学生映射
                    var nameToStudent = {};
                    for (var j = 0; j < studentsCache.length; j++) {
                        nameToStudent[studentsCache[j].name] = studentsCache[j];
                    }

                    var upsertRows = [];

                    for (var r = 1; r < rows.length; r++) {
                        var row = rows[r];
                        if (!row || !row[idxName]) continue;

                        var name = String(row[idxName] || '').trim();
                        if (!name) continue;

                        var totalScore = (idxTotal !== -1) ? (parseFloat(row[idxTotal]) || 0) : 0;
                        if (totalScore === 0 && idxChinese !== -1 && idxMath !== -1 && idxEnglish !== -1) {
                            totalScore = (parseFloat(row[idxChinese]) || 0) + (parseFloat(row[idxMath]) || 0) + (parseFloat(row[idxEnglish]) || 0);
                        }

                        var existing = nameToStudent[name];
                        if (existing) {
                            existing.totalScore = totalScore;
                            upsertRows.push(existing);
                            updateCount++;
                        } else {
                            var newId = String(Date.now()) + '_' + r;
                            var newStudent = {
                                id: newId,
                                name: name,
                                gender: '待完善',
                                totalScore: totalScore,
                                recentPerformance: '新导入的学生',
                                extraTags: []
                            };
                            upsertRows.push(newStudent);
                            nameToStudent[name] = newStudent;
                            importCount++;
                        }
                    }

                    if (upsertRows.length === 0) {
                        showToast('未从文件中读取到有效学生数据');
                        return;
                    }

                    var result = await supabase.from('students').upsert(upsertRows, { onConflict: 'id' });
                    if (result.error) {
                        showToast('导入失败：' + result.error.message);
                        return;
                    }

                    var msg = '成功导入 ' + importCount + ' 名学生';
                    if (updateCount > 0) {
                        msg += '，更新 ' + updateCount + ' 名学生';
                    }
                    showToast(msg, 2500);
                } catch (err) {
                    showToast('解析文件出错：' + err.message);
                }
            };

            reader.readAsArrayBuffer(file);
            e.target.value = '';
        }

        // ===== 学生详情模态框 =====
        var currentStudentId = null;

        function openStudentModal(studentId) {
            var student = null;
            for (var i = 0; i < studentsCache.length; i++) {
                if (studentsCache[i].id === studentId) { student = studentsCache[i]; break; }
            }
            if (!student) return;

            currentStudentId = studentId;

            document.getElementById('modal-title').textContent = student.name;
            document.getElementById('modal-score').textContent = (student.totalScore || 0) + ' 分';

            var genderSelect = document.getElementById('modal-gender');
            if (student.gender === '女') {
                genderSelect.value = '女';
            } else {
                genderSelect.value = '男';
            }

            document.getElementById('modal-textarea').value = student.recentPerformance || '';
            document.getElementById('tag-input').value = '';
            renderTags(student);
            document.getElementById('modal-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e && e.target !== document.getElementById('modal-overlay')) return;
            closeModalDirect();
        }

        function closeModalDirect() {
            document.getElementById('modal-overlay').classList.remove('open');
            document.body.style.overflow = '';
            currentStudentId = null;
        }

        async function savePerformance() {
            if (!currentStudentId) return;
            if (!supabaseReady) { showToast('云端未连接'); return; }

            var newText = document.getElementById('modal-textarea').value.trim();
            var newGender = document.getElementById('modal-gender').value;

            var result = await supabase.from('students').update({
                recentPerformance: newText,
                gender: newGender
            }).eq('id', currentStudentId);

            if (result.error) {
                showToast('保存失败：' + result.error.message);
                return;
            }

            document.getElementById('modal-textarea').value = newText;
            showToast('保存成功');
        }

        // ===== 词条管理 =====
        function renderTags(student) {
            var container = document.getElementById('modal-tags');
            var tags = student.extraTags || [];

            if (tags.length === 0) {
                container.innerHTML = '<div class="tag-list-empty">暂无词条</div>';
                return;
            }

            var html = '<div class="tag-list">';
            for (var i = 0; i < tags.length; i++) {
                html += '<span class="tag-item">';
                html += escapeHtml(tags[i]);
                html += '<button class="tag-delete" onclick="deleteTag(' + i + ')">✕</button>';
                html += '</span>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        async function deleteTag(index) {
            if (!currentStudentId) return;
            if (!supabaseReady) { showToast('云端未连接'); return; }

            var student = null;
            for (var i = 0; i < studentsCache.length; i++) {
                if (studentsCache[i].id === currentStudentId) { student = studentsCache[i]; break; }
            }
            if (!student) return;

            var tags = (student.extraTags || []).slice();
            tags.splice(index, 1);

            var result = await supabase.from('students').update({ extraTags: tags }).eq('id', currentStudentId);
            if (result.error) {
                showToast('删除失败：' + result.error.message);
                return;
            }
        }

        async function addTag() {
            if (!currentStudentId) return;
            if (!supabaseReady) { showToast('云端未连接'); return; }

            var input = document.getElementById('tag-input');
            var newTag = input.value.trim();
            if (!newTag) return;

            var student = null;
            for (var i = 0; i < studentsCache.length; i++) {
                if (studentsCache[i].id === currentStudentId) { student = studentsCache[i]; break; }
            }
            if (!student) return;

            var tags = (student.extraTags || []).slice();
            tags.push(newTag);

            var result = await supabase.from('students').update({ extraTags: tags }).eq('id', currentStudentId);
            if (result.error) {
                showToast('添加失败：' + result.error.message);
                return;
            }

            input.value = '';
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // ===== 启动应用 =====
        initApp();
    </script>

</body>
</html>
